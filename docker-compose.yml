version: '3.8'

services:
  xunnet-panel:
    build: .
    container_name: xunnet-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "10085:10085"
    environment:
      - DB_DRIVER=sqlite
      - DB_PATH=/app/data/xunnet.db
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FEDERATION_ENABLED=true
      - FEDERATION_API_KEY=${FEDERATION_API_KEY}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./certs:/app/certs
    networks:
      - xunnet-network

  postgres:
    image: postgres:15
    container_name: xunnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xunnet
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: xunnet
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - xunnet-network

  redis:
    image: redis:7-alpine
    container_name: xunnet-redis
    restart: unless-stopped
    networks:
      - xunnet-network

networks:
  xunnet-network:
    driver: bridge
