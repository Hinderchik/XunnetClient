name: Build Xunnet Desktop

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets: inherit
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true
        default: "dev"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-amd64
            qt_arch: gcc_64
          - os: windows-latest
            arch: windows-amd64
            qt_arch: win64_msvc2019_64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.3"
          host: "linux"
          target: "desktop"
          arch: "gcc_64"

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cd xunnet-desktop
          mkdir -p build && cd build
          cmake ..
          cmake --build . --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd xunnet-desktop
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release --parallel

      - name: Package Desktop (Linux)
        if: runner.os == 'Linux'
        run: |
          cd xunnet-desktop/build/bin
          mv XunnetDesktopApp xunnet-desktop-linux-amd64
          chmod +x xunnet-desktop-linux-amd64

      - name: Package Desktop (Windows)
        if: runner.os == 'Windows'
        run: |
          cd xunnet-desktop/build/bin/Release
          ren XunnetDesktopApp.exe xunnet-desktop-windows-amd64.exe

      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xunnet-desktop-${{ matrix.arch }}
          path: |
            xunnet-desktop/build/bin/xunnet-desktop-linux-amd64
            xunnet-desktop/build/bin/Release/xunnet-desktop-windows-amd64.exe
