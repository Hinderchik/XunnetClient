name: Build Xunnet Panel

# Note: no push/pull_request triggers - panel is built only via workflow_call
# (from release-all.yml) or manual workflow_dispatch. This avoids accidental
# duplicate CI runs and keeps the workflow lean.

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      push_docker:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "dev"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/xunnet-panel

jobs:
  test-backend:
    name: Test Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xunnet-panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: xunnet-panel/go.sum

      - name: Ensure web/dist exists for embed
        run: |
          mkdir -p xunnet-panel/web/dist
          if [ ! -f xunnet-panel/web/dist/index.html ]; then
            printf '<!DOCTYPE html><html><body><div id="root"></div></body></html>\n' > xunnet-panel/web/dist/index.html
          fi

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

  test-frontend:
    name: Test React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xunnet-panel/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  build-binary:
    name: Build Binary Release
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    env:
      VERSION: ${{ inputs.version }}
      GOOS: ${{ matrix.target.goos }}
      GOARCH: ${{ matrix.target.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: xunnet-panel/web
        run: |
          npm install
          npm run build

      - name: Build backend binary
        working-directory: xunnet-panel
        run: |
          go build -ldflags="-s -w -X main.version=${VERSION}" -o xunnet-panel-${{ matrix.target.suffix }} .

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          fail_on_unmatched_files: false
          files: xunnet-panel/xunnet-panel-${{ matrix.target.suffix }}

  build-docker:
    name: Build Docker Image
    needs: [test-backend, test-frontend]
    if: inputs.push_docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./xunnet-panel
          file: ./xunnet-panel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
