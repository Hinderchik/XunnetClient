name: Release Xunnet All Platforms

# This is the 4th workflow — it orchestrates all platform builds and creates the GitHub release.
# Triggered automatically by any tag matching v* (e.g. v1.0.0, v1.2.3, v2.0.0).
#
# Prerelease logic:
#   - If the 3rd digit (patch) changes vs. the previous tag → marked as PRERELEASE
#   - If the 1st (major) or 2nd (minor) digit changes   → marked as full RELEASE
#   - If no previous tag exists                          → full RELEASE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/xunnet-panel

jobs:
  # ------------------------------------------------------------------
  # Build all 3 platforms in parallel by calling the individual workflows.
  # ------------------------------------------------------------------
  build-android:
    name: Build Android
    uses: ./.github/workflows/android-build.yml
    with:
      version: ${{ github.ref_name }}

  build-desktop:
    name: Build Desktop
    uses: ./.github/workflows/desktop-build.yml
    with:
      version: ${{ github.ref_name }}

  build-panel:
    name: Build Panel
    uses: ./.github/workflows/panel-build.yml
    with:
      version: ${{ github.ref_name }}
      push_docker: true

  # ------------------------------------------------------------------
  # Determine release type: prerelease vs full release.
  # Rule:
  #   - Same major.minor as previous tag (only patch changed) → prerelease = true
  #   - Different major.minor (major or minor changed)        → prerelease = false
  # ------------------------------------------------------------------
  detect-release-type:
    name: Detect Prerelease vs Release
    needs: [build-android, build-desktop, build-panel]
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.detect.outputs.prerelease }}
      release_type: ${{ steps.detect.outputs.release_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release type
        id: detect
        run: |
          set -euo pipefail

          CURRENT="${{ github.ref_name }}"
          # Allow workflow_dispatch to provide a custom version
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT="${{ inputs.version }}"
          fi
          CURRENT="${CURRENT#v}"

          echo "Current version: v${CURRENT}"

          # Get previous semver tag (vX.Y.Z) excluding the current one
          PREVIOUS=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^v${CURRENT}$" \
            | head -1 || true)

          if [ -z "$PREVIOUS" ]; then
            echo "No previous semver tag found — first release, treating as full release"
            PRERELEASE="false"
            RELEASE_TYPE="release"
          else
            PREVIOUS="${PREVIOUS#v}"
            echo "Previous version: v${PREVIOUS}"

            CURRENT_MM=$(echo "$CURRENT"  | cut -d. -f1,2)
            PREVIOUS_MM=$(echo "$PREVIOUS" | cut -d. -f1,2)

            if [ "$CURRENT_MM" = "$PREVIOUS_MM" ]; then
              echo "major.minor unchanged (${CURRENT_MM}); only patch changed → PRERELEASE"
              PRERELEASE="true"
              RELEASE_TYPE="prerelease"
            else
              echo "major.minor changed (${PREVIOUS_MM} → ${CURRENT_MM}) → full RELEASE"
              PRERELEASE="false"
              RELEASE_TYPE="release"
            fi
          fi

          echo "prerelease=${PRERELEASE}"   >> "$GITHUB_OUTPUT"
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Create the GitHub release and attach all artifacts.
  # ------------------------------------------------------------------
  release:
    name: Create Release
    needs: detect-release-type
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: xunnet-android
          path: ./artifacts/android

      - name: Download Desktop artifacts (Linux)
        uses: actions/download-artifact@v4
        with:
          name: xunnet-desktop-linux-amd64
          path: ./artifacts/desktop/linux
        continue-on-error: true

      - name: Download Desktop artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: xunnet-desktop-windows-amd64
          path: ./artifacts/desktop/windows
        continue-on-error: true

      - name: Download Panel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xunnet-panel-*
          path: ./artifacts/panel
        continue-on-error: true

      - name: Flatten artifacts
        run: |
          mkdir -p ./artifacts/all
          find ./artifacts -type f \( -name "*.apk" -o -name "*.aab" \
                                 -o -name "*.exe" \
                                 -o -name "xunnet-panel-*" \) \
            -exec cp {} ./artifacts/all/ \; 2>/dev/null || true
          echo "--- Collected artifacts ---"
          ls -la ./artifacts/all/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Xunnet ${{ github.ref_name }}
          prerelease: ${{ needs.detect-release-type.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ./artifacts/all/*
          fail_on_unmatched_files: false
          body: |
            ## Xunnet ${{ github.ref_name }}

            **Release type:** ${{ needs.detect-release-type.outputs.release_type }}
            **Prerelease:** ${{ needs.detect-release-type.outputs.prerelease }}

            ${{ needs.detect-release-type.outputs.prerelease == 'true' && '> :warning: This is a **prerelease** (only the patch version changed from the previous tag).' || '> :rocket: This is a **full release** (major or minor version changed).' }}

            ### Android
            Download `*.apk` or `*.aab` from the assets below.

            ### Desktop
            Download the binary for your platform:
            - Linux: `xunnet-desktop-linux-amd64`
            - Windows: `xunnet-desktop-windows-amd64.exe`

            ### Panel
            Download the binary for your platform or use Docker:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Deployment
            See [README.md](README.md) and [docs/BUILD.md](docs/BUILD.md) for instructions.
