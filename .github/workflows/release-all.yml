name: Release Xunnet All Platforms

# 4th workflow: orchestrator. Triggers on v* tags, calls 3 build workflows,
# detects prerelease vs full release, creates the GitHub release.
#
# Prerelease logic:
#   - 3rd digit (patch) changes vs. previous tag -> PRERELEASE
#   - 1st (major) or 2nd (minor) digit changes   -> full RELEASE
#   - No previous tag                            -> full RELEASE

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/xunnet-panel

# Workflow-level permissions: needed because called workflows (panel-build)
# inherit permissions from the caller. 'packages: write' is required for
# docker push to ghcr.io, 'contents: write' for creating the release.
permissions:
  contents: write
  packages: write

jobs:
  build-android:
    name: Build Android
    uses: ./.github/workflows/android-build.yml
    with:
      version: ${{ github.ref_name }}

  build-desktop:
    name: Build Desktop
    uses: ./.github/workflows/desktop-build.yml
    with:
      version: ${{ github.ref_name }}

  build-panel:
    name: Build Panel
    uses: ./.github/workflows/panel-build.yml
    with:
      version: ${{ github.ref_name }}
      push_docker: true

  detect-release-type:
    name: Detect Prerelease vs Release
    needs: [build-android, build-desktop, build-panel]
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.detect.outputs.prerelease }}
      release_type: ${{ steps.detect.outputs.release_type }}
      prerelease_message: ${{ steps.detect.outputs.prerelease_message }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release type
        id: detect
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CURRENT="${INPUT_VERSION}"
          else
            CURRENT="${REF_NAME}"
          fi
          CURRENT="${CURRENT#v}"

          echo "Current version: v${CURRENT}"

          PREVIOUS=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^v${CURRENT}$" \
            | head -1 || true)

          if [ -z "$PREVIOUS" ]; then
            echo "No previous semver tag found, treating as full release"
            PRERELEASE="false"
            RELEASE_TYPE="release"
            PRERELEASE_MESSAGE="This is the first release."
          else
            PREVIOUS="${PREVIOUS#v}"
            echo "Previous version: v${PREVIOUS}"

            CURRENT_MM=$(echo "$CURRENT"  | cut -d. -f1,2)
            PREVIOUS_MM=$(echo "$PREVIOUS" | cut -d. -f1,2)

            if [ "$CURRENT_MM" = "$PREVIOUS_MM" ]; then
              echo "major.minor unchanged (${CURRENT_MM}); only patch changed -> PRERELEASE"
              PRERELEASE="true"
              RELEASE_TYPE="prerelease"
              PRERELEASE_MESSAGE="This is a prerelease (only patch version changed from v${PREVIOUS})."
            else
              echo "major.minor changed (${PREVIOUS_MM} -> ${CURRENT_MM}) -> full RELEASE"
              PRERELEASE="false"
              RELEASE_TYPE="release"
              PRERELEASE_MESSAGE="This is a full release (major or minor version changed from v${PREVIOUS})."
            fi
          fi

          {
            echo "prerelease=${PRERELEASE}"
            echo "release_type=${RELEASE_TYPE}"
            echo "prerelease_message=${PRERELEASE_MESSAGE}"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create Release
    needs: detect-release-type
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      PRERELEASE: ${{ needs.detect-release-type.outputs.prerelease }}
      RELEASE_TYPE: ${{ needs.detect-release-type.outputs.release_type }}
      PRERELEASE_MESSAGE: ${{ needs.detect-release-type.outputs.prerelease_message }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: xunnet-android
          path: ./artifacts/android
        continue-on-error: true

      - name: Download Desktop artifacts (Linux)
        uses: actions/download-artifact@v4
        with:
          name: xunnet-desktop-linux-amd64
          path: ./artifacts/desktop/linux
        continue-on-error: true

      - name: Download Desktop artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: xunnet-desktop-windows-amd64
          path: ./artifacts/desktop/windows
        continue-on-error: true

      - name: Download Panel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xunnet-panel-*
          path: ./artifacts/panel
        continue-on-error: true

      - name: Flatten artifacts
        run: |
          mkdir -p ./artifacts/all
          find ./artifacts -type f \( -name "*.apk" -o -name "*.aab" \
                                 -o -name "*.exe" \
                                 -o -name "xunnet-panel-*" \) \
            -exec cp {} ./artifacts/all/ \; 2>/dev/null || true
          echo "--- Collected artifacts ---"
          ls -la ./artifacts/all/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Xunnet ${{ env.TAG_NAME }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ./artifacts/all/*
          body: |
            ## Xunnet ${{ env.TAG_NAME }}

            **Release type:** ${{ env.RELEASE_TYPE }}
            **Prerelease:** ${{ env.PRERELEASE }}

            > ${{ env.PRERELEASE_MESSAGE }}

            ### Android
            Download `*.apk` or `*.aab` from the assets below.

            ### Desktop
            Download the binary for your platform:
            - Linux: `xunnet-desktop-linux-amd64`
            - Windows: `xunnet-desktop-windows-amd64.exe`

            ### Panel
            Download the binary for your platform or use Docker:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_NAME }}
            ```

            ### Deployment
            See [README.md](README.md) and [docs/BUILD.md](docs/BUILD.md) for instructions.
