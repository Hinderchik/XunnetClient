name: Release Xunnet All Platforms

# 4th workflow: orchestrator. Triggers on v* tags, calls 3 build workflows,
# detects prerelease vs full release, creates the GitHub release.
#
# Prerelease logic:
#   - 3rd digit (patch) changes vs. previous tag -> PRERELEASE
#   - 1st (major) or 2nd (minor) digit changes   -> full RELEASE
#   - No previous tag                            -> full RELEASE
#
# Files flow: release is created empty -> each build workflow uploads its
# files directly to the release via softprops/action-gh-release. No artifact
# storage is used, so the GitHub Actions storage quota is not consumed.

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/xunnet-panel

permissions:
  contents: write
  packages: write

jobs:
  # ------------------------------------------------------------------
  # Step 1: create the (empty) GitHub Release first.
  # Build workflows will upload their files into this release later.
  # ------------------------------------------------------------------
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.detect.outputs.prerelease }}
      release_type: ${{ steps.detect.outputs.release_type }}
      prerelease_message: ${{ steps.detect.outputs.prerelease_message }}
      tag_name: ${{ steps.detect.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release type
        id: detect
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CURRENT="${INPUT_VERSION}"
          else
            CURRENT="${REF_NAME}"
          fi
          CURRENT="${CURRENT#v}"

          echo "Current version: v${CURRENT}"

          PREVIOUS=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^v${CURRENT}$" \
            | head -1 || true)

          if [ -z "$PREVIOUS" ]; then
            echo "No previous semver tag found, treating as full release"
            PRERELEASE="false"
            RELEASE_TYPE="release"
            PRERELEASE_MESSAGE="This is the first release."
          else
            PREVIOUS="${PREVIOUS#v}"
            echo "Previous version: v${PREVIOUS}"

            CURRENT_MM=$(echo "$CURRENT"  | cut -d. -f1,2)
            PREVIOUS_MM=$(echo "$PREVIOUS" | cut -d. -f1,2)

            if [ "$CURRENT_MM" = "$PREVIOUS_MM" ]; then
              echo "major.minor unchanged (${CURRENT_MM}); only patch changed -> PRERELEASE"
              PRERELEASE="true"
              RELEASE_TYPE="prerelease"
              PRERELEASE_MESSAGE="This is a prerelease (only patch version changed from v${PREVIOUS})."
            else
              echo "major.minor changed (${PREVIOUS_MM} -> ${CURRENT_MM}) -> full RELEASE"
              PRERELEASE="false"
              RELEASE_TYPE="release"
              PRERELEASE_MESSAGE="This is a full release (major or minor version changed from v${PREVIOUS})."
            fi
          fi

          TAG_NAME="v${CURRENT}"
          {
            echo "prerelease=${PRERELEASE}"
            echo "release_type=${RELEASE_TYPE}"
            echo "prerelease_message=${PRERELEASE_MESSAGE}"
            echo "tag_name=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Create empty GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Xunnet ${{ steps.detect.outputs.tag_name }}
          tag_name: ${{ steps.detect.outputs.tag_name }}
          prerelease: ${{ steps.detect.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Xunnet ${{ steps.detect.outputs.tag_name }}

            **Release type:** ${{ steps.detect.outputs.release_type }}
            **Prerelease:** ${{ steps.detect.outputs.prerelease }}

            > ${{ steps.detect.outputs.prerelease_message }}

            _Builds are running. Files will be attached automatically as they complete._

  # ------------------------------------------------------------------
  # Step 2: run all 3 platform builds in parallel.
  # Each reusable workflow uploads its files directly to the release
  # created above (no artifact storage involved).
  # ------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: prepare-release
    uses: ./.github/workflows/android-build.yml
    with:
      version: ${{ needs.prepare-release.outputs.tag_name }}

  build-desktop:
    name: Build Desktop
    needs: prepare-release
    uses: ./.github/workflows/desktop-build.yml
    with:
      version: ${{ needs.prepare-release.outputs.tag_name }}

  build-panel:
    name: Build Panel
    needs: prepare-release
    uses: ./.github/workflows/panel-build.yml
    with:
      version: ${{ needs.prepare-release.outputs.tag_name }}
      push_docker: true

  # ------------------------------------------------------------------
  # Step 3: update the release body with the final summary.
  # ------------------------------------------------------------------
  finalize-release:
    name: Finalize Release
    needs: [prepare-release, build-android, build-desktop, build-panel]
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
      PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
      RELEASE_TYPE: ${{ needs.prepare-release.outputs.release_type }}
      PRERELEASE_MESSAGE: ${{ needs.prepare-release.outputs.prerelease_message }}
      REGISTRY: ${{ env.REGISTRY }}
      IMAGE_NAME: ${{ env.IMAGE_NAME }}
    steps:
      - name: Update release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          fail_on_unmatched_files: false
          body: |
            ## Xunnet ${{ env.TAG_NAME }}

            **Release type:** ${{ env.RELEASE_TYPE }}
            **Prerelease:** ${{ env.PRERELEASE }}

            > ${{ env.PRERELEASE_MESSAGE }}

            ### Android
            Download `*.apk` or `*.aab` from the assets below.

            ### Desktop
            Download the binary for your platform:
            - Linux: `xunnet-desktop-linux-amd64`
            - Windows: `xunnet-desktop-windows-amd64.exe`

            ### Panel
            Download the binary for your platform or use Docker:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_NAME }}
            ```

            ### Deployment
            See [README.md](README.md) and [docs/BUILD.md](docs/BUILD.md) for instructions.
